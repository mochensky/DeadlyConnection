plugins {
    id 'net.fabricmc.fabric-loom'
}

sourceSets {
    main {
        java {
            srcDirs 'src/main/java'
        }
        resources {
            srcDirs 'src/main/resources', '../main'
        }
    }
}

def version_suffix = '26.1.x'

dependencies {
    minecraft "com.mojang:minecraft:26.1"

    implementation "net.fabricmc:fabric-loader:0.19.2"
    implementation "net.fabricmc.fabric-api:fabric-api:0.145.1+26.1"
}

processResources {
    inputs.property 'version', project.version
    inputs.property 'loader_version', '0.19.2'
    inputs.property 'minecraft_version_range', '>=26.1 <26.2'

    filteringCharset 'UTF-8'

    filesMatching('fabric.mod.json') {
        expand(
                version: project.version,
                loader_version: '0.19.2',
                minecraft_version_range: '>=26.1 <26.2'
        )
    }

    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

tasks.withType(JavaCompile).configureEach {
    options.release.set(25)
}

tasks.named('sourcesJar') {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

jar {
    archiveVersion = "${project.version}-mc${version_suffix}"
    destinationDirectory = file("${project.rootDir}/build/libs")
}

sourcesJar {
    archiveVersion = "${project.version}-mc${version_suffix}"
    destinationDirectory = file("${project.rootDir}/build/libs")
}